<h5 class="bl">Html</h5>
<a class="copy-btn" href="javascript:;" clip-copy="getTextToCopy('.demo-html')">Copy</a>
<pre class="demo-html" make-pre-code='html'>
<textarea>
<style>
♦...♦
<input type="text" 
  ng-model="formData.userNameA" 
  error-pro-tip="globalObj" 
  error-pro-preset="presetObj.nameA"
>

<input type="text" 
  ng-model="formData.userNameB" 
  error-pro-tip="globalObj" 
  error-pro-preset="presetObj.nameB"
>

<span class="hide-me" 
  error-pro-group-value="formData.userNameA+formData.userNameB" 
  error-pro-tip="globalObj" 
  error-pro-preset="presetObj.groupName" 
  error-pro-limit-show="globalObj.resultObj.nameA||globalObj.resultObj.nameB"
>
  {{formData.userNameA}}{{formData.userNameB}}
</span>
♦...♦
</style>
</textarea>
</pre>

<h5 class="gy">Javascript</h5>
<a class="copy-btn" href="javascript:;" clip-copy="getTextToCopy('.demo-js')">Copy</a>
<pre class="demo-js" make-pre-code='js'>
<textarea>
♦...♦
$scope.presetObj = {
	nameA: {
		id: 'nameA',
		ruleTip: {
			rule: [/^.{1,}$/, /^[a-zA-Z]+$/],
			tip: ['Required!', 'Must be letters!']
		}
	},
	nameB: {
		id: 'nameB',
		ruleTip: {
			rule: [/^.{1,}$/, /^[a-zA-Z]+$/],
			tip: ['Required!', 'Must be letters!']
		}
	},
	groupName: {
		id: 'groupName',
		ruleTip: {
			rule: [/^[a-zA-Z]{4,16}$/],
			tip: ['GroupName length 4-16 characters!']
		}
	}
};
♦...♦
</textarea>
</pre>
