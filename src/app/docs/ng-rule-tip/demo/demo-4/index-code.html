<h5 class="bl">Html</h5>
<a class="copy-btn" href="javascript:;" clip-copy="getTextToCopy('.demo-html')">Copy</a>
<pre class="demo-html" make-pre-code='html'>
<textarea>
<style>
♦...♦
<input type="text" 
  ng-model="formData.userNameA" 
  rule-tip="globalObj" 
  rule-tip-preset="presetObj.nameA"
>

<input type="text" 
  ng-model="formData.userNameB" 
  rule-tip="globalObj" 
  rule-tip-preset="presetObj.nameB"
  rule-tip-private="{params:[formData],items:formData}"
>
♦...♦
</style>
</textarea>
</pre>

<h5 class="gy">Javascript</h5>
<a class="copy-btn" href="javascript:;" clip-copy="getTextToCopy('.demo-js')">Copy</a>
<pre class="demo-js" make-pre-code='js'>
<textarea>
♦...♦
$scope.presetObj = {
	nameA: {
		id: 'nameA',
		ruleTip: {
			rule: [/^.{1,}$/, /^[a-zA-Z]+$/],
			tip: ['Required!', 'Must be letters!']
		}
	},
	nameB: {
		id: 'nameB',
		items: {
			linkKey: 'userNameA'
		},
		ruleTip: {
			rule: [/^.{1,}$/, /^[a-zA-Z]+$/, fn],
			tip: ['Required!', 'Must be letters!', 'Must be equal to the above!']
		}
	}
};

function fn(value, param) {
	return value === param.userNameA;
}
♦...♦
</textarea>
</pre>
